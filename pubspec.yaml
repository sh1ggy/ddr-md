name: ddr_md
description: "DDR Markdown"
publish_to: 'none'
version: 1.0.1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.38.6"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  fl_chart: ^0.66.2
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3+1
  path: ^1.9.0
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  ffi: ^2.1.5
  native_opencv:
    path: native_opencv
  path_provider: ^2.1.5
  image_picker: ^1.2.1
  get: ^4.7.3
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  assets:
    - assets/
    - assets/icons/
    - assets/jackets-160/
    - assets/jackets/
    # Only the model triple the app loads at runtime (ocr_onnx.cpp defaults).
    # The other variants in assets/models/ exist for the offline
    # native_opencv/tools/model_compare harness and must not ship in the bundle.
    - assets/models/ppocr_small_det.onnx
    - assets/models/ppocr_small_rec.onnx
    - assets/models/ppocrv6_small_dict.txt
    - assets/templates/
  fonts:
    - family: Handel
      fonts: 
        - asset: fonts/handel_gothic.ttf
  uses-material-design: true
