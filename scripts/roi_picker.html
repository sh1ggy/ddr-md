<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ROI Picker</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1e1e1e;
    color: #ddd;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  #left {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #toolbar {
    padding: 10px;
    background: #2a2a2a;
    border-bottom: 1px solid #444;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  #toolbar button, #toolbar label {
    background: #3a3a3a;
    color: #ddd;
    border: 1px solid #555;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 4px;
    font-size: 13px;
  }
  #toolbar button:hover, #toolbar label:hover {
    background: #4a4a4a;
  }
  #toolbar button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  #canvasWrap {
    flex: 1;
    overflow: auto;
    background: #111;
    position: relative;
  }
  #canvas {
    display: block;
    cursor: none;
  }
  #magnifier {
    position: absolute;
    width: 160px;
    height: 160px;
    border: 2px solid #fff;
    border-radius: 50%;
    box-shadow: 0 0 0 1px #000, 0 4px 12px rgba(0,0,0,0.6);
    pointer-events: none;
    display: none;
    overflow: hidden;
    z-index: 10;
  }
  #magnifier canvas {
    display: block;
  }
  #magnifier::before,
  #magnifier::after {
    content: '';
    position: absolute;
    background: #ff3b3b;
    pointer-events: none;
  }
  #magnifier::before {
    left: 50%;
    top: 0;
    bottom: 0;
    width: 1px;
    transform: translateX(-0.5px);
  }
  #magnifier::after {
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    transform: translateY(-0.5px);
  }
  #right {
    width: 380px;
    background: #252525;
    border-left: 1px solid #444;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #status {
    padding: 10px;
    background: #2a2a2a;
    border-bottom: 1px solid #444;
    font-size: 12px;
    color: #aaa;
  }
  #roiList {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }
  .roi-item {
    background: #2f2f2f;
    border: 1px solid #444;
    border-left: 4px solid var(--roi-color, #4af);
    border-radius: 4px;
    padding: 8px;
    margin-bottom: 8px;
    font-size: 12px;
  }
  .roi-item .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .roi-item .header strong {
    color: var(--roi-color, #4af);
  }
  .roi-item .header .btns {
    display: flex;
    gap: 4px;
  }
  .roi-item .header button {
    background: #5a2020;
    color: #faa;
    border: 1px solid #844;
    border-radius: 3px;
    padding: 2px 6px;
    cursor: pointer;
    font-size: 11px;
  }
  .roi-item .header button.save {
    background: #20502a;
    color: #afa;
    border: 1px solid #484;
  }
  .roi-item input.name {
    width: 100%;
    margin-top: 6px;
    background: #1e1e1e;
    color: #ddd;
    border: 1px solid #555;
    border-radius: 3px;
    padding: 3px 6px;
    font-size: 12px;
    font-family: "SF Mono", Menlo, monospace;
  }
  .roi-item .preview {
    margin-top: 6px;
    border: 1px solid #444;
    background:
      linear-gradient(45deg, #333 25%, transparent 25%, transparent 75%, #333 75%) 0 0 / 12px 12px,
      linear-gradient(45deg, #333 25%, #2a2a2a 25%, #2a2a2a 75%, #333 75%) 6px 6px / 12px 12px;
    image-rendering: pixelated;
    max-width: 100%;
    display: block;
  }
  .roi-item .coords {
    font-family: "SF Mono", Menlo, monospace;
    color: #bbb;
    line-height: 1.5;
    word-break: break-all;
  }
  .roi-item .coords .label {
    color: #888;
  }
  #cursorInfo {
    padding: 6px 10px;
    background: #2a2a2a;
    border-top: 1px solid #444;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 12px;
    color: #aaa;
  }
  .hint {
    color: #888;
    font-size: 11px;
    margin-left: auto;
  }
</style>
</head>
<body>
<div id="left">
  <div id="toolbar">
    <label>
      Load image
      <input type="file" id="fileInput" accept="image/*" style="display:none">
    </label>
    <button id="cancelBtn" disabled>Cancel point (Esc)</button>
    <button id="clearAllBtn">Clear all</button>
    <button id="exportBtn">Copy ROIs</button>
    <button id="saveAllBtn">Save all PNGs</button>
    <label>
      Zoom
      <input type="range" id="zoomRange" min="2" max="12" step="1" value="5" style="vertical-align:middle">
    </label>
    <span class="hint">Click two points to make a rectangle ROI · Esc cancels · Cmd/Ctrl+Z undoes last</span>
  </div>
  <div id="canvasWrap">
    <canvas id="canvas"></canvas>
    <div id="magnifier"><canvas id="magCanvas" width="160" height="160"></canvas></div>
  </div>
  <div id="cursorInfo">Load an image to begin.</div>
</div>
<div id="right">
  <div id="status">ROIs: 0</div>
  <div id="roiList"></div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const canvasWrap = document.getElementById('canvasWrap');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const magnifier = document.getElementById('magnifier');
const magCanvas = document.getElementById('magCanvas');
const magCtx = magCanvas.getContext('2d');
const cancelBtn = document.getElementById('cancelBtn');
const clearAllBtn = document.getElementById('clearAllBtn');
const exportBtn = document.getElementById('exportBtn');
const saveAllBtn = document.getElementById('saveAllBtn');
const zoomRange = document.getElementById('zoomRange');
const roiList = document.getElementById('roiList');
const status = document.getElementById('status');
const cursorInfo = document.getElementById('cursorInfo');

const PALETTE = ['#4af', '#fa4', '#4f8', '#f48', '#fc4', '#8af', '#f84', '#4fc', '#a4f', '#cf4'];
const MAG_SIZE = 160;

let img = null;
let rois = [];
let firstPoint = null;
let mouse = { x: 0, y: 0, clientX: 0, clientY: 0, over: false };
let zoom = parseInt(zoomRange.value, 10);

magCtx.imageSmoothingEnabled = false;

fileInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const url = URL.createObjectURL(f);
  const im = new Image();
  im.onload = () => {
    img = im;
    canvas.width = im.naturalWidth;
    canvas.height = im.naturalHeight;
    rois = [];
    firstPoint = null;
    render();
    updateUI();
    cursorInfo.textContent = `Image: ${im.naturalWidth} × ${im.naturalHeight}`;
    URL.revokeObjectURL(url);
  };
  im.src = url;
});

zoomRange.addEventListener('input', () => {
  zoom = parseInt(zoomRange.value, 10);
  if (mouse.over) drawMagnifier();
});

function canvasPosFromEvent(e) {
  const r = canvas.getBoundingClientRect();
  const sx = canvas.width / r.width;
  const sy = canvas.height / r.height;
  return {
    x: Math.round((e.clientX - r.left) * sx),
    y: Math.round((e.clientY - r.top) * sy)
  };
}

canvas.addEventListener('click', e => {
  if (!img) return;
  const p = canvasPosFromEvent(e);
  if (!firstPoint) {
    firstPoint = p;
  } else {
    addRoi(firstPoint, p);
    firstPoint = null;
  }
  render();
  updateUI();
});

canvas.addEventListener('mousemove', e => {
  if (!img) return;
  const p = canvasPosFromEvent(e);
  mouse = { x: p.x, y: p.y, clientX: e.clientX, clientY: e.clientY, over: true };
  cursorInfo.textContent = `Cursor: (${mouse.x}, ${mouse.y})  ·  Image: ${img.naturalWidth} × ${img.naturalHeight}  ·  ${firstPoint ? 'Click second point to finish' : 'Click first point'}`;
  positionMagnifier();
  drawMagnifier();
  render();
});

canvas.addEventListener('mouseenter', () => {
  if (!img) return;
  magnifier.style.display = 'block';
});

canvas.addEventListener('mouseleave', () => {
  mouse.over = false;
  magnifier.style.display = 'none';
  render();
});

window.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    firstPoint = null;
    render();
    updateUI();
  } else if ((e.key === 'z' || e.key === 'Z') && (e.metaKey || e.ctrlKey)) {
    e.preventDefault();
    if (firstPoint) {
      firstPoint = null;
    } else if (rois.length > 0) {
      rois.pop();
    }
    render();
    updateUI();
  }
});

cancelBtn.addEventListener('click', () => {
  firstPoint = null;
  render();
  updateUI();
});
clearAllBtn.addEventListener('click', () => {
  if (rois.length === 0 && !firstPoint) return;
  if (!confirm('Clear all ROIs?')) return;
  rois = [];
  firstPoint = null;
  render();
  updateUI();
});
exportBtn.addEventListener('click', () => {
  const text = rois
    .map(r => `TL: ${r.x}, ${r.y}; BR: ${r.x + r.w}, ${r.y + r.h}`)
    .join('\n');
  navigator.clipboard.writeText(text).then(() => {
    exportBtn.textContent = 'Copied!';
    setTimeout(() => exportBtn.textContent = 'Copy ROIs', 1200);
  });
});

saveAllBtn.addEventListener('click', () => {
  if (rois.length === 0) return;
  rois.forEach((r, i) => setTimeout(() => saveRoi(r), i * 150));
});

function addRoi(a, b) {
  const x = Math.min(a.x, b.x);
  const y = Math.min(a.y, b.y);
  const w = Math.abs(b.x - a.x);
  const h = Math.abs(b.y - a.y);
  if (w === 0 || h === 0) return;
  rois.push({ x, y, w, h, name: `template_${rois.length}` });
}

// Crop the ROI region out of the source image into its own canvas.
function cropCanvas(r) {
  const c = document.createElement('canvas');
  c.width = r.w;
  c.height = r.h;
  const cx = c.getContext('2d');
  cx.imageSmoothingEnabled = false;
  cx.drawImage(img, r.x, r.y, r.w, r.h, 0, 0, r.w, r.h);
  return c;
}

function saveRoi(r) {
  const c = cropCanvas(r);
  c.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const base = (r.name || 'template').trim().replace(/[^\w.-]+/g, '_') || 'template';
    a.download = base.endsWith('.png') ? base : base + '.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }, 'image/png');
}

function colorFor(i) {
  return PALETTE[i % PALETTE.length];
}

function render() {
  if (!img) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    return;
  }
  ctx.drawImage(img, 0, 0);
  rois.forEach((r, i) => {
    const color = colorFor(i);
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.strokeRect(r.x, r.y, r.w, r.h);
    ctx.fillStyle = color;
    ctx.font = 'bold 14px sans-serif';
    ctx.fillText(String(i), r.x + 4, r.y + 16);
    ctx.restore();
  });
  if (firstPoint) {
    const color = colorFor(rois.length);
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    if (mouse.over) {
      const x = Math.min(firstPoint.x, mouse.x);
      const y = Math.min(firstPoint.y, mouse.y);
      const w = Math.abs(mouse.x - firstPoint.x);
      const h = Math.abs(mouse.y - firstPoint.y);
      ctx.strokeRect(x, y, w, h);
    }
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.arc(firstPoint.x, firstPoint.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }
}

function positionMagnifier() {
  const wrapRect = canvasWrap.getBoundingClientRect();
  const localX = mouse.clientX - wrapRect.left + canvasWrap.scrollLeft;
  const localY = mouse.clientY - wrapRect.top + canvasWrap.scrollTop;
  magnifier.style.left = (localX - MAG_SIZE / 2) + 'px';
  magnifier.style.top = (localY - MAG_SIZE / 2) + 'px';
}

function drawMagnifier() {
  if (!img) return;
  const srcSize = MAG_SIZE / zoom;
  const sx = mouse.x - srcSize / 2;
  const sy = mouse.y - srcSize / 2;
  magCtx.fillStyle = '#000';
  magCtx.fillRect(0, 0, MAG_SIZE, MAG_SIZE);
  magCtx.imageSmoothingEnabled = false;
  magCtx.drawImage(canvas, sx, sy, srcSize, srcSize, 0, 0, MAG_SIZE, MAG_SIZE);
}

function updateUI() {
  cancelBtn.disabled = !firstPoint;
  status.textContent = `ROIs: ${rois.length}${firstPoint ? ' · waiting for 2nd point' : ''}`;
  roiList.innerHTML = '';
  rois.forEach((r, i) => {
    const color = colorFor(i);
    const div = document.createElement('div');
    div.className = 'roi-item';
    div.style.setProperty('--roi-color', color);
    div.innerHTML = `
      <div class="header">
        <strong>ROI ${i}</strong>
        <div class="btns">
          <button class="save">Save PNG</button>
          <button class="del">Delete</button>
        </div>
      </div>
      <div class="coords">
        <div><span class="label">xywh:</span> x=${r.x}, y=${r.y}, w=${r.w}, h=${r.h}</div>
        <div><span class="label">corners:</span> (${r.x}, ${r.y}) → (${r.x + r.w}, ${r.y + r.h})</div>
      </div>
      <input class="name" type="text" value="${r.name || ''}" placeholder="filename (.png)">
    `;
    const nameInput = div.querySelector('input.name');
    nameInput.addEventListener('input', () => { r.name = nameInput.value; });

    if (img) {
      const preview = cropCanvas(r);
      preview.className = 'preview';
      div.appendChild(preview);
    }

    div.querySelector('button.save').addEventListener('click', () => saveRoi(r));
    div.querySelector('button.del').addEventListener('click', () => {
      rois.splice(i, 1);
      render();
      updateUI();
    });
    roiList.appendChild(div);
  });
}

updateUI();
</script>
</body>
</html>
